name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create site and deploy
        run: |
          netlify sites:create --name tunihome-preview --account-slug hamdijawher-workspace 2>/dev/null || true
          SITE_ID=$(netlify sites:list --json | jq -r '.[] | select(.name=="tunihome-preview") | .id')
          netlify deploy --prod --dir=. --site=$SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: nfp_PnjjbAdinSNaTFDDP9MZG49532iru7Xy7c84
