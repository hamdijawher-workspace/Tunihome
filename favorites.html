<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Review and manage your favorite listings and agencies." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="canonical" href="https://tunihome.tn/favorites.html" />
    <meta property="og:site_name" content="TuniHome" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Favorites | TuniHome" />
    <meta property="og:description" content="Review and manage your favorite listings and agencies." />
    <meta property="og:image" content="https://tunihome.tn/assets/hero-home.jpg" />
    <meta property="og:url" content="https://tunihome.tn/favorites.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Favorites | TuniHome" />
    <meta name="twitter:description" content="Review and manage your favorite listings and agencies." />
    <meta name="twitter:image" content="https://tunihome.tn/assets/hero-home.jpg" />
    <meta name="theme-color" content="#f4f6fa" />
    <title>Favorites | TuniHome</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="animations.css" />
    <link rel="manifest" href="site.webmanifest" />
  </head>
  <body class="page" data-page="favorites">
    <div class="mobile-shell page-favorites">
      <header class="topbar home-header">
        <div class="home-nav-shell">
          <a class="brand home-brand" href="index.html" aria-label="Go to home">
            <h1>TUNIHOME</h1>
          </a>

          <div class="nav-actions home-nav-actions">
            <select class="lang-select" data-language-select aria-label="Language">
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="ar">العربية</option>
            </select>
            <a class="btn mini" href="list-property.html">List your properties</a>
            <a class="icon-btn nav-account" href="login.html" aria-label="My account">
              <svg class="icon-user-svg" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c1.8-3.8 5.1-5.6 8-5.6s6.2 1.8 8 5.6"></path></svg>
            </a>
          </div>
        </div>
      </header>

      <main class="favorites-main">
        <section class="dashboard-hero reveal" data-delay="1">
          <h2 id="favorites-hero-title">Your saved spaces</h2>
          <p id="favorites-hero-subtitle">Review saved listings and agencies in one place.</p>
        </section>

        <section class="section reveal" data-delay="2">
          <div class="favorites-tabs" role="tablist" aria-label="Favorites sections">
            <button id="favorites-tab-listings" class="tab active" type="button">Favorite listings</button>
            <button id="favorites-tab-agencies" class="tab" type="button">Favorite agencies</button>
          </div>

          <section id="favorites-listings-section" class="favorites-section">
            <div class="section-head">
              <h3 id="favorites-listings-title" class="section-title">Favorite listings</h3>
              <span class="subtle" id="favorites-listings-count"></span>
            </div>
            <div id="favorites-listings-grid" class="listings listing-grid-home"></div>
          </section>

          <section id="favorites-agencies-section" class="favorites-section hidden">
            <div class="section-head">
              <h3 id="favorites-agencies-title" class="section-title">Favorite agencies</h3>
              <span class="subtle" id="favorites-agencies-count"></span>
            </div>
            <div id="favorites-agencies-grid" class="agency-row favorites-agency-row"></div>
          </section>

          <div class="section-head favorites-footer-actions">
            <a id="favorites-back-dashboard" class="btn light mini" href="dashboard.html">Back to dashboard</a>
          </div>
        </section>
      </main>

      <nav class="footer-nav" aria-label="Primary navigation">
        <a class="nav-item" href="index.html">⌂<span>Home</span></a>
        <a class="nav-item" href="search.html">⌕<span>Search</span></a>
        <a class="nav-item" href="list-property.html">＋<span>List</span></a>
        <a class="nav-item active" href="dashboard.html">▦<span>My Listings</span></a>
      </nav>

      <footer class="site-footer"></footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
